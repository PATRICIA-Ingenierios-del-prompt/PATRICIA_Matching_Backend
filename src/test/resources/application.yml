# Requerido para que cualquier test que arranque contexto de Spring (WebMvcTest
# incluido: @EnableFeignClients registra los beans de Feign ANTES de que el
# slicing de WebMvcTest filtre nada, así que las URLs de los FeignClient se
# resuelven igual aunque el test no los use para nada) no reviente por
# placeholders sin valor (${ALGO} sin default en application.yml principal).
# Mismo patrón que ya usan Users y Gateway en sus src/test/resources.
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/test
    username: test
    password: test
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    addresses: amqp://guest:guest@localhost:5672
    username: guest
    password: guest

security:
  internal-api-key: test-internal-key

jwt:
  secret: test-secret-test-secret-test-secret-test-secret

usuario-service:
  url: http://localhost:8082

parches-core-service:
  url: http://localhost:8083

cors:
  allowed-origins: http://localhost:3000
