server:
  port: ${SERVER_PORT:8086}
#  servlet:
#    context-path: /matching

spring:

  application:
    name: matching-service

  # Nombres de binding de Spring Boot (mismo patrón que usuarios-service):
  # el ExternalSecret escribe directamente estas claves, sin capa de traducción.
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    # Mismo caso que Users: el historial de Flyway se borró pero la tabla
    # matches existe y tiene datos. Baseline en V1 = "ya está aplicada";
    # en una BD vacía no aplica y las migraciones corren normal.
    baseline-on-migrate: true
    baseline-version: 1 # = última migración ya aplicada (V1__create_matches_table)

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      ssl:
        enabled: true   # ElastiCache (transit_encryption_enabled=true) exige TLS - mismo fix que Auth/Users

  # Amazon MQ requiere el scheme amqps://, que solo `addresses` codifica bien
  # (host/port separados no bastan). Los 3 nombres de abajo (SPRING_RABBITMQ_*)
  # son el binding nativo de Spring Boot -> los provee directo el secret
  # patricia-dev/amazon-mq via el ExternalSecret, sin necesidad de mapear a
  # nombres custom. RABBITMQ_VHOST se mantiene con default local.
  rabbitmq:
    addresses: ${SPRING_RABBITMQ_ADDRESSES}
    username: ${SPRING_RABBITMQ_USERNAME}
    password: ${SPRING_RABBITMQ_PASSWORD}
    virtual-host: ${RABBITMQ_VHOST:/}
    publisher-confirm-type: correlated
    publisher-returns: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

security:
  internal-api-key: ${INTERNAL_API_KEY}

jwt:
  secret: ${JWT_SECRET}

usuario-service:
  url: ${USUARIO_SERVICE_URL}

parches-core-service:
  url: ${PARCHES_CORE_SERVICE_URL}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

messaging:
  exchange: patricia.matching
  usuarios-exchange: patricia.usuarios
  queues:
    usuario-actualizado: matching.usuario-actualizado

matching:
  candidatos:
    max-pool: ${MATCHING_MAX_POOL:200}
  sugerencias:
    tamano-cola: ${MATCHING_TAMANO_COLA:50}
    ttl-horas: ${MATCHING_SUGERENCIAS_TTL_HORAS:24}
  likes:
    ttl-dias: ${MATCHING_LIKES_TTL_DIAS:30}
  parches-comun:
    habilitado: ${MATCHING_PARCHES_COMUN_HABILITADO:false}
    bonus-por-parche: ${MATCHING_BONUS_POR_PARCHE:0.05}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
