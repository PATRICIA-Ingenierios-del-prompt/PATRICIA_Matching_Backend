server:
  port: ${SERVER_PORT:8086}

spring:

  application:
    name: matching-service

  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASS}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASS}
    virtual-host: ${RABBITMQ_VHOST:/}
    publisher-confirm-type: correlated
    publisher-returns: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

security:
  internal-api-key: ${INTERNAL_API_KEY}

usuario-service:
  url: ${USUARIO_SERVICE_URL}

parches-core-service:
  url: ${PARCHES_CORE_SERVICE_URL}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

messaging:
  exchange: patricia.matching
  usuarios-exchange: patricia.usuarios
  queues:
    usuario-actualizado: matching.usuario-actualizado

matching:
  candidatos:
    max-pool: ${MATCHING_MAX_POOL:200}
  sugerencias:
    tamano-cola: ${MATCHING_TAMANO_COLA:50}
    ttl-horas: ${MATCHING_SUGERENCIAS_TTL_HORAS:24}
  likes:
    ttl-dias: ${MATCHING_LIKES_TTL_DIAS:30}
  parches-comun:
    habilitado: ${MATCHING_PARCHES_COMUN_HABILITADO:false}
    bonus-por-parche: ${MATCHING_BONUS_POR_PARCHE:0.05}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
