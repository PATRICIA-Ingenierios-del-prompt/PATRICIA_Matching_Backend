apiVersion: apps/v1
kind: Deployment
metadata:
  name: matching
  namespace: patricia-app
  labels: { app: matching, patricia.io/sg-tier: standard }
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: { app: matching }
  template:
    metadata:
      labels: { app: matching, patricia.io/sg-tier: standard }
    spec:
      serviceAccountName: matching
      containers:
        - name: matching
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8086
          envFrom:
            - configMapRef: { name: matching-config }
            - secretRef:    { name: matching-secrets }
          # Mismo patrón que Auth/Users:
          # - startupProbe le da tiempo a la JVM de arrancar (Fargate frío +
          #   Spring Security + JPA + Redis + Rabbit) antes de que
          #   liveness/readiness empiecen a chequear.
          # - timeoutSeconds:3 (no el 1s default de Kubernetes) para evitar
          #   reinicios por lentitud puntual bajo poca CPU, no por un hang real.
          # - livenessProbe pega a /actuator/health/liveness (señal solo de la
          #   JVM), nunca al /actuator/health agregado — un blip transitorio de
          #   Redis/Rabbit no debe matar un pod sano. readinessProbe sí refleja
          #   la salud real de las dependencias, porque solo controla el
          #   tráfico, no mata el pod.
          # - SecurityConfig ya permite /actuator/health/** con wildcard, así
          #   que el subpath de liveness ya es alcanzable sin cambios de código.

          startupProbe:
            httpGet: { path: /actuator/health, port: 8086 }
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8086 }
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8086 }
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
