# Non-secret configuration. JWT_SECRET, RabbitMQ, Redis y Postgres vienen del
# Secret matching-secrets sincronizado por el ExternalSecret (ver
# externalsecret.yaml).
apiVersion: v1
kind: ConfigMap
metadata:
  name: matching-config
  namespace: patricia-app
data:
  SERVER_PORT: {{ .Values.config.serverPort | quote }}
  CORS_ALLOWED_ORIGINS: {{ .Values.config.corsAllowedOrigins | quote }}
  USUARIO_SERVICE_URL: {{ .Values.config.usuarioServiceUrl | quote }}
  PARCHES_CORE_SERVICE_URL: {{ .Values.config.parchesCoreServiceUrl | quote }}
  MATCHING_MAX_POOL: {{ .Values.config.matchingMaxPool | quote }}
  MATCHING_TAMANO_COLA: {{ .Values.config.matchingTamanoCola | quote }}
  MATCHING_SUGERENCIAS_TTL_HORAS: {{ .Values.config.matchingSugerenciasTtlHoras | quote }}
  MATCHING_LIKES_TTL_DIAS: {{ .Values.config.matchingLikesTtlDias | quote }}
  MATCHING_PARCHES_COMUN_HABILITADO: {{ .Values.config.matchingParchesComunHabilitado | quote }}
  MATCHING_BONUS_POR_PARCHE: {{ .Values.config.matchingBonusPorParche | quote }}
  # Activa MockParcheMembresiaAdapter (ver values.yaml: quitar cuando Parches
  # Core exponga /internal/parches/en-comun).
  SPRING_PROFILES_ACTIVE: {{ .Values.config.springProfilesActive | quote }}
