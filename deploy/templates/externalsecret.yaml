# Trae todo lo que Matching necesita desde AWS Secrets Manager hacia un
# Secret nativo de k8s (matching-secrets) que el Deployment monta vía envFrom.
#
# jwt-secret e internal-api-key son strings planos en AWS SM (sin `property`,
# se usa el valor completo) — MISMAS entradas que usan Auth/Gateway/Users, no
# copias.
#
# amazon-mq, cache-redis y matching/rds son blobs JSON, cada campo necesita su
# propio `property`. Los nombres de secretKey de abajo coinciden con la
# convención de binding de variables de entorno de Spring Boot
# (SPRING_RABBITMQ_*, SPRING_DATASOURCE_*, SPRING_DATA_REDIS_PASSWORD) —
# application.yml ya está actualizado para usar exactamente estos nombres,
# mismo patrón que Users (y antes, el fix de RabbitMQ en Auth). REDIS_HOST y
# REDIS_PORT mantienen sus nombres tal cual porque application.yml ya los
# espera exactamente así.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: matching-secrets
  namespace: patricia-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.clusterSecretStore }}
    kind: ClusterSecretStore
  target:
    name: matching-secrets
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/jwt-secret" }
    - secretKey: INTERNAL_API_KEY
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/internal-api-key" }
    - secretKey: SPRING_RABBITMQ_ADDRESSES
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/amazon-mq", property: SPRING_RABBITMQ_ADDRESSES }
    - secretKey: SPRING_RABBITMQ_USERNAME
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/amazon-mq", property: SPRING_RABBITMQ_USERNAME }
    - secretKey: SPRING_RABBITMQ_PASSWORD
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/amazon-mq", property: SPRING_RABBITMQ_PASSWORD }
    - secretKey: REDIS_HOST
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/cache-redis", property: REDIS_HOST }
    - secretKey: REDIS_PORT
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/cache-redis", property: REDIS_PORT }
    - secretKey: SPRING_DATA_REDIS_PASSWORD
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/cache-redis", property: REDIS_PASSWORD }
    - secretKey: SPRING_DATASOURCE_URL
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/matching/rds", property: SPRING_DATASOURCE_URL }
    - secretKey: SPRING_DATASOURCE_USERNAME
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/matching/rds", property: SPRING_DATASOURCE_USERNAME }
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/matching/rds", property: SPRING_DATASOURCE_PASSWORD }
