# Defaults for the Matching MS chart. The CD job overrides image.repository and
# image.tag per deploy (pinned to the commit SHA); everything else is edited
# here and versioned with the code it configures.

image:
  repository: ""            # set by CD: <account>.dkr.ecr.<region>.amazonaws.com/patricia-dev/matching
  tag: ""                   # set by CD: short commit SHA
  pullPolicy: IfNotPresent

# Stateless REST + listener sobre Redis/RabbitMQ. 2 replicas por disponibilidad.
replicaCount: 2

serviceAccount:
  roleArn: "" # Matching no llama a ningun SDK de AWS (sin S3, sin nada) -> no necesita IRSA. Dejar vacio.

config:
  serverPort: "8086"
  corsAllowedOrigins: "https://d2o13kfv3bj832.cloudfront.net"
  usuarioServiceUrl: "http://users.patricia-app.svc.cluster.local:8082"
  parchesCoreServiceUrl: "http://parches.patricia-app.svc.cluster.local:8083"
  matchingMaxPool: "200"
  matchingTamanoCola: "50"
  matchingSugerenciasTtlHoras: "24"
  matchingLikesTtlDias: "30"
  # Parches Core todavia no expone /internal/parches/en-comun (ver
  # ParcheCoreFeignClient.java) -> mantener el perfil mock-parches activo y el
  # bonus desactivado hasta que ese endpoint exista. Cuando exista: quitar
  # "mock-parches" de aca y poner matchingParchesComunHabilitado en "true".
  springProfilesActive: "mock-parches"
  matchingParchesComunHabilitado: "false"
  matchingBonusPorParche: "0.05"

# External Secrets Operator: remote keys in AWS Secrets Manager
# (created by Ulink_Infra module.secrets; prefix = ${project_name}-${environment}).
externalSecrets:
  clusterSecretStore: patricia-aws-secrets-manager
  prefix: "patricia-dev"
  # NOTE on lo que ya deberia estar provisionado en AWS Secrets Manager
  # (confirmar con `aws secretsmanager list-secrets` antes de aplicar):
  #   patricia-dev/jwt-secret     -> EXISTE (compartido, mismo que Auth/Gateway).
  #   patricia-dev/amazon-mq      -> EXISTE (compartido). Keys nativas
  #                                  SPRING_RABBITMQ_ADDRESSES/USERNAME/PASSWORD
  #                                  (application.yml de Matching ya se ajusto
  #                                  para usar `addresses`, ver el fix adjunto).
  #   patricia-dev/cache-redis    -> EXISTE (compartido con Auth/Parche Core/
  #                                  Location/Collaboration). Keys REDIS_HOST/
  #                                  REDIS_PORT/REDIS_PASSWORD.
  #   patricia-dev/matching/rds   -> DEBERIA existir ya: "matching" esta en
  #                                  rds_services y en ecr_repositories por
  #                                  default en variables.tf, asi que si ya
  #                                  corriste terraform apply para el resto de
  #                                  servicios, esta instancia y este secret ya
  #                                  se crearon. Confirmalo con
  #                                  `aws secretsmanager list-secrets | grep matching`
  #                                  y `aws rds describe-db-instances` antes de
  #                                  asumirlo. Su forma es SPRING_DATASOURCE_URL/
  #                                  USERNAME/PASSWORD (nativa), y application.yml
  #                                  ya usa exactamente esos mismos nombres --
  #                                  sin mapeo a nombres custom.
  #   patricia-dev/internal-api-key -> CONFIRMAR si ya existe (en la sesion de
  #                                  Auth todavia no existia). Si no existe,
  #                                  Matching arranca igual (sin @Validated en
  #                                  esa property) pero /internal/** y las
  #                                  llamadas Feign que mandan
  #                                  X-Internal-Api-Key van a fallar validacion
  #                                  del lado de Usuarios/Parches hasta que el
  #                                  valor real exista y sea el MISMO en los
  #                                  tres servicios.

resources:
  requests: { cpu: 500m, memory: 768Mi }
  limits:   { cpu: "1",  memory: 1Gi }

hpa:
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
