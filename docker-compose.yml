services:

  redis:
    image: redis:7.2-alpine
    container_name: matching-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: matching-rabbitmq
    restart: unless-stopped
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-matching}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-changeme}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: matching-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: matching
      POSTGRES_USER: ${POSTGRES_USER:-matching}
      POSTGRES_PASSWORD: ${POSTGRES_PASS:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-matching} -d matching"]
      interval: 5s
      timeout: 5s
      retries: 10

  matching-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: matching-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: ${SERVER_PORT:-8086}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/matching
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-matching}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_SSL_ENABLED: "false"
      SPRING_RABBITMQ_ADDRESSES: rabbitmq:5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-matching}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-changeme}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      USUARIO_SERVICE_URL: ${USUARIO_SERVICE_URL:-http://usuarios-service:8082}
      PARCHES_CORE_SERVICE_URL: ${PARCHES_CORE_SERVICE_URL:-http://parches-core-service:8083}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      MATCHING_MAX_POOL: ${MATCHING_MAX_POOL:-200}
      MATCHING_TAMANO_COLA: ${MATCHING_TAMANO_COLA:-50}
      MATCHING_SUGERENCIAS_TTL_HORAS: ${MATCHING_SUGERENCIAS_TTL_HORAS:-24}
      MATCHING_LIKES_TTL_DIAS: ${MATCHING_LIKES_TTL_DIAS:-30}
      MATCHING_PARCHES_COMUN_HABILITADO: ${MATCHING_PARCHES_COMUN_HABILITADO:-false}
      MATCHING_BONUS_POR_PARCHE: ${MATCHING_BONUS_POR_PARCHE:-0.05}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-mock-parches}
    ports:
      - "8086:8086"

volumes:
  redis_data:
  rabbitmq_data:
  postgres_data:
